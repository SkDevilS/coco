# Nginx configuration for Trendora Ventures
# Place this file at: /etc/nginx/sites-available/trendoraventures.conf
# Create symlink: sudo ln -s /etc/nginx/sites-available/trendoraventures.conf /etc/nginx/sites-enabled/

# API Server - api.trendoraventures.in
server {
    listen 80;
    server_name api.trendoraventures.in;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.trendoraventures.in;
    
    # SSL Configuration (Let's Encrypt certificates)
    ssl_certificate /etc/letsencrypt/live/api.trendoraventures.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.trendoraventures.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Logging
    access_log /var/log/nginx/api.trendoraventures.in.access.log;
    error_log /var/log/nginx/api.trendoraventures.in.error.log;
    
    # Max upload size
    client_max_body_size 16M;
    
    # Proxy to Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
        
        # Timeouts
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
    
    # Static files - uploads
    location /uploads/ {
        alias /var/www/trendoraventures/trendoraventures/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# Main Website - trendoraventures.in
server {
    listen 80;
    server_name trendoraventures.in www.trendoraventures.in;
    
    # Redirect HTTP to HTTPS
    return 301 https://trendoraventures.in$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.trendoraventures.in;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/trendoraventures.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trendoraventures.in/privkey.pem;
    
    # Redirect www to non-www
    return 301 https://trendoraventures.in$request_uri;
}

server {
    listen 443 ssl http2;
    server_name trendoraventures.in;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/trendoraventures.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trendoraventures.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Logging
    access_log /var/log/nginx/trendoraventures.in.access.log;
    error_log /var/log/nginx/trendoraventures.in.error.log;
    
    # Document root
    root /var/www/trendoraventures/trendoraventures/dist;
    index index.html;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
    
    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

